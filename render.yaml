services:
  - type: web
    name: inachalle
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python scripts/init_db.py
    startCommand: gunicorn run:app --workers 2 --timeout 60 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: inachalle-db
          property: connectionString
      - key: SEED_ON_BOOT
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"

databases:
  - name: inachalle-db
    plan: free
    databaseName: inachalle
    user: inachalle
