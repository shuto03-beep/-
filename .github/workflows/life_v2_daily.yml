name: Life V2 Daily Coach

# 朝(JST 06:30)の Morning Set + 夜(JST 22:00)の Evening Ledger を自動実行する。
# Plaud V1 の最新 entries をテキスト化して life_v2.coach に投入し、
# Discord に Next Actions を投稿する（カレンダー登録までは人間の Yes/No 承認）。

on:
  schedule:
    # 朝 JST 06:30 = UTC 21:30 (前日)
    - cron: '30 21 * * *'
    # 夜 JST 22:00 = UTC 13:00
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        type: choice
        options: [morning, evening, coach]
        default: morning

concurrency:
  group: life-v2-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ritual:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存インストール
        run: pip install anthropic

      - name: モード判定
        id: mode
        env:
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
          SCHEDULE_CRON: ${{ github.event.schedule }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            kind="${DISPATCH_MODE:-morning}"
          elif [ "$SCHEDULE_CRON" = "30 21 * * *" ]; then
            kind="morning"
          else
            kind="evening"
          fi
          echo "解決された kind=$kind"
          echo "kind=$kind" >> "$GITHUB_OUTPUT"

      - name: Webhook 診断
        env:
          LIFE_V2_DISCORD_WEBHOOK_URL: ${{ secrets.LIFE_V2_DISCORD_WEBHOOK_URL }}
          PLAUD_DISCORD_WEBHOOK_URL: ${{ secrets.PLAUD_DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python <<'PY'
          import os, hashlib
          for name in ("LIFE_V2_DISCORD_WEBHOOK_URL", "PLAUD_DISCORD_WEBHOOK_URL", "DISCORD_WEBHOOK_URL"):
              v = os.environ.get(name, "")
              if v:
                  trimmed = v.strip()
                  print(f"{name}: set / len={len(v)} / trimmed_len={len(trimmed)} / hash={hashlib.sha256(v.encode()).hexdigest()[:12]} / starts_https={v.startswith('https://discord.com')}")
              else:
                  print(f"{name}: empty")
          PY
          # Discord に直接投稿テスト
          URL="${LIFE_V2_DISCORD_WEBHOOK_URL:-${PLAUD_DISCORD_WEBHOOK_URL:-$DISCORD_WEBHOOK_URL}}"
          if [ -z "$URL" ]; then
            echo "::error::全 webhook secret が空"
            exit 1
          fi
          HTTP=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -X POST -H "Content-Type: application/json" \
            -d '{"content":"[diagnostic] GitHub Actions 直接投稿テスト"}' \
            "$URL")
          echo "Discord HTTP code: $HTTP"
          if [ -f /tmp/resp.txt ]; then
            echo "--- response body ---"
            cat /tmp/resp.txt
            echo "---"
          fi


      - name: Morning Set
        if: steps.mode.outputs.kind == 'morning'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LIFE_V2_DISCORD_WEBHOOK_URL: ${{ secrets.LIFE_V2_DISCORD_WEBHOOK_URL }}
          PLAUD_DISCORD_WEBHOOK_URL: ${{ secrets.PLAUD_DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -m life_v2 morning --save --notify
          python -m life_v2 coach --recent-days 1 --save --save-scorecard --notify

      - name: Evening Ledger
        if: steps.mode.outputs.kind == 'evening'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LIFE_V2_DISCORD_WEBHOOK_URL: ${{ secrets.LIFE_V2_DISCORD_WEBHOOK_URL }}
          PLAUD_DISCORD_WEBHOOK_URL: ${{ secrets.PLAUD_DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -m life_v2 evening --recent-days 1 --save --save-scorecard --notify
          # 週末は美学を蒸留して Discord に投稿
          if [ "$(date +%u)" = "7" ]; then
            python -m life_v2 distill --days 30 --save --json | head -c 1500 || true
          fi

      - name: Coach (manual)
        if: steps.mode.outputs.kind == 'coach'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LIFE_V2_DISCORD_WEBHOOK_URL: ${{ secrets.LIFE_V2_DISCORD_WEBHOOK_URL }}
          PLAUD_DISCORD_WEBHOOK_URL: ${{ secrets.PLAUD_DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m life_v2 coach --recent-days 1 --save --save-scorecard --notify

      - name: 永続化コミット
        run: |
          git config user.name "Life V2 Bot"
          git config user.email "bot@life-v2.local"
          git add data/life_v2/ || true
          git diff --cached --quiet || git commit -m "life_v2: ${{ steps.mode.outputs.kind }} run $(date +%Y-%m-%d)"
          git push || true
