name: Swing Trading Bot

on:
  schedule:
    # 平日15分間隔（UTC 0:00-6:00 = JST 9:00-15:00）
    - cron: '*/15 0-6 * * 1-5'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: キャッシュ復元
        uses: actions/cache@v4
        with:
          path: data/cache
          key: stock-cache-${{ github.run_number }}
          restore-keys: stock-cache-

      - name: ライブラリのインストール
        run: pip install -r requirements.txt

      - name: Bot実行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: 状態保存
        run: |
          git config user.name "Trading Bot"
          git config user.email "bot@trading.local"
          git add data/
          git diff --cached --quiet || git commit -m "Update trading state $(date +%Y%m%d_%H%M)"
          git push
