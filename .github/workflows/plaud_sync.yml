name: Plaud Auto Sync

on:
  schedule:
    # 毎日 JST 06:00 = UTC 21:00
    - cron: '0 21 * * *'
  workflow_dispatch:

concurrency:
  group: plaud-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存インストール
        run: pip install python-docx anthropic requests

      - name: Plaud Web から新しい録音を自動取得
        env:
          PLAUD_BEARER_TOKEN: ${{ secrets.PLAUD_BEARER_TOKEN }}
          PLAUD_API_DOMAIN: ${{ secrets.PLAUD_API_DOMAIN }}
        run: python -m plaud_lifelog sync --limit 72 --no-analyze

      - name: エントリを保存
        run: |
          git config user.name "Plaud Bot"
          git config user.email "bot@plaud.local"
          git add data/plaud/entries/ data/plaud/index.json data/plaud/tasks.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Plaud sync $(date +%Y-%m-%d)"
          git push || true
